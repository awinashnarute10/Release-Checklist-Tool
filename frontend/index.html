<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ReleaseCheck — your all-in-one release checklist tool."
    />
    <title>ReleaseCheck</title>
    <script>
      // Apply persisted/system theme before paint to avoid a flash of wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem("rc-theme");
          var dark =
            stored === "dark" ||
            (!stored &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

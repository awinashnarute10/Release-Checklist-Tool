# Test profile: use an in-memory H2 database (PostgreSQL compatibility mode) so
# tests run with zero external services. Flyway is disabled and Hibernate
# creates the schema from the entity mappings.
spring:
  datasource:
    url: jdbc:h2:mem:releasecheck;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: false
